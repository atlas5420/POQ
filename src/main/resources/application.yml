spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/POQ      # pet_archive 대신 대문자 POQ로 변경!
    username: postgres                              # 기본 관리자 계정 ID
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
app:
  upload-dir: ./uploads
  
  